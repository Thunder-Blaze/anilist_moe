query (
  $page: Int
  $id: Int
  $perPage: Int
  $search: String
  $sort: [StudioSort]
  # NOT filters
  $id_not: Int
  $id_in: [Int]
  $id_not_in: [Int]
  # Extra
  $includeMedia: Boolean = false
  # Sub-pagination variables
  $mediaPage: Int = 1
  $mediaPerPage: Int = 10
) {
  Page(page: $page, perPage: $perPage) {
    pageInfo {
      hasNextPage
    }
    studios(id: $id, search: $search, sort: $sort, id_not: $id_not, id_in: $id_in, id_not_in: $id_not_in) {
      id
      name
      isAnimationStudio
      isFavourite
      siteUrl
      favourites
      media(sort: [START_DATE_DESC], page: $mediaPage, perPage: $mediaPerPage) @include(if: $includeMedia) {
        pageInfo {
            total
            perPage
            currentPage
            lastPage
            hasNextPage
        }
        edges {
            id
            isMainStudio
            node {
                id
                title {
                    romaji
                    english
                    native
                    userPreferred
                }
                type
                format
                status
                startDate {
                    year
                    month
                    day
                }
                endDate {
                    year
                    month
                    day
                }
                season
                seasonYear
                episodes
                chapters
                volumes
                averageScore
                popularity
                coverImage {
                    large
                    medium
                    color
                }
                bannerImage
                genres
                isAdult
            }
        }
      }
    }
  }
}
