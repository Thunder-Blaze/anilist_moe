query SearchStudios(
    $id: Int
    $search: String
    $sort: [StudioSort] = [ID]
    $page: Int = 1
    $perPage: Int = 20
    # NOT filters
    $id_not: Int
    $id_in: [Int]
    $id_not_in: [Int]
    # Sub-pagination variables
    $mediaPage: Int = 1
    $mediaPerPage: Int = 25
) {
    Page(page: $page, perPage: $perPage) {
        pageInfo {
            total
            currentPage
            lastPage
            hasNextPage
            perPage
        }
        studios(
            id: $id
            search: $search
            sort: $sort
            id_not: $id_not
            id_in: $id_in
            id_not_in: $id_not_in
        ) {
            id
            name
            isAnimationStudio
            isFavourite
            siteUrl
            media(page: $mediaPage, perPage: $mediaPerPage) {
                edges {
                    id
                    isMainStudio
                    node {
                        id
                        title {
                            romaji
                            english
                            native
                            userPreferred
                        }
                        type
                        format
                        status
                        startDate {
                            year
                            month
                            day
                        }
                        coverImage {
                            large
                            medium
                        }
                        averageScore
                        popularity
                    }
                }
            }
            favourites
        }
    }
}
