query MediaSearch(
    # Search filters
    $id: Int
    $idMal: Int
    $search: String
    $type: MediaType
    $format: [MediaFormat]
    $status: MediaStatus
    $season: MediaSeason
    $seasonYear: Int
    $year: String
    $genre: [String]
    $tag: [String]
    $tagCategory: [String]
    $minimumTagRank: Int
    $source: [MediaSource]
    $countryOfOrigin: CountryCode
    $isLicensed: Boolean
    $isAdult: Boolean

    # Range filters
    $averageScore_greater: Int
    $averageScore_lesser: Int
    $popularity_greater: Int
    $popularity_lesser: Int
    $episodes_greater: Int
    $episodes_lesser: Int
    $duration_greater: Int
    $duration_lesser: Int
    $chapters_greater: Int
    $chapters_lesser: Int
    $volumes_greater: Int
    $volumes_lesser: Int
    $startDate_greater: FuzzyDateInt
    $startDate_lesser: FuzzyDateInt
    $endDate_greater: FuzzyDateInt
    $endDate_lesser: FuzzyDateInt

    # Pagination & sorting
    $sort: [MediaSort]
    $page: Int = 1
    $perPage: Int = 20

    # Extended data toggle
    $extended: Boolean = false
) {
    Page(page: $page, perPage: $perPage) {
        pageInfo {
            total
            currentPage
            lastPage
            hasNextPage
            perPage
        }
        media(
            id: $id
            idMal: $idMal
            search: $search
            type: $type
            format_in: $format
            status: $status
            season: $season
            seasonYear: $seasonYear
            startDate_like: $year
            genre_in: $genre
            tag_in: $tag
            tagCategory_in: $tagCategory
            minimumTagRank: $minimumTagRank
            source_in: $source
            countryOfOrigin: $countryOfOrigin
            isLicensed: $isLicensed
            isAdult: $isAdult
            averageScore_greater: $averageScore_greater
            averageScore_lesser: $averageScore_lesser
            popularity_greater: $popularity_greater
            popularity_lesser: $popularity_lesser
            episodes_greater: $episodes_greater
            episodes_lesser: $episodes_lesser
            duration_greater: $duration_greater
            duration_lesser: $duration_lesser
            chapters_greater: $chapters_greater
            chapters_lesser: $chapters_lesser
            volumes_greater: $volumes_greater
            volumes_lesser: $volumes_lesser
            startDate_greater: $startDate_greater
            startDate_lesser: $startDate_lesser
            endDate_greater: $endDate_greater
            endDate_lesser: $endDate_lesser
            sort: $sort
        ) {
            # Core fields (always included)
            id
            idMal
            title {
                romaji
                english
                native
                userPreferred
            }
            type
            format
            status
            description(asHtml: false) @include(if: $extended)
            startDate @include(if: $extended) {
                year
                month
                day
            }
            endDate @include(if: $extended) {
                year
                month
                day
            }
            season
            seasonYear
            seasonInt @include(if: $extended)
            episodes
            duration @include(if: $extended)
            chapters
            volumes @include(if: $extended)
            countryOfOrigin @include(if: $extended)
            isLicensed @include(if: $extended)
            source @include(if: $extended)
            hashtag @include(if: $extended)
            trailer @include(if: $extended) {
                id
                site
                thumbnail
            }
            updatedAt @include(if: $extended)
            coverImage {
                extraLarge @include(if: $extended)
                large
                medium
                color @include(if: $extended)
            }
            bannerImage @include(if: $extended)
            genres
            synonyms @include(if: $extended)
            averageScore
            meanScore @include(if: $extended)
            popularity
            isLocked @include(if: $extended)
            trending @include(if: $extended)
            favourites
            tags @include(if: $extended) {
                id
                name
                description
                category
                rank
                isGeneralSpoiler
                isMediaSpoiler
                isAdult
                userId
            }
            relations @include(if: $extended) {
                edges {
                    id
                    relationType(version: 2)
                    node {
                        id
                        title {
                            romaji
                            english
                            native
                            userPreferred
                        }
                        format
                        type
                        status
                        coverImage {
                            medium
                        }
                        startDate {
                            year
                        }
                        averageScore
                        siteUrl
                    }
                }
            }
            characters(page: 1, perPage: 25, sort: [ROLE, RELEVANCE, ID]) @include(if: $extended) {
                edges {
                    id
                    role
                    name
                    voiceActors(language: JAPANESE, sort: [RELEVANCE, ID]) {
                        id
                        name {
                            first
                            middle
                            last
                            full
                            native
                            userPreferred
                        }
                        languageV2
                        image {
                            large
                            medium
                        }
                        description(asHtml: false)
                        primaryOccupations
                        gender
                        dateOfBirth {
                            year
                            month
                            day
                        }
                        age
                        yearsActive
                        homeTown
                        bloodType
                        favourites
                        isFavourite
                        isFavouriteBlocked
                        siteUrl
                    }
                    node {
                        id
                        name {
                            first
                            middle
                            last
                            full
                            native
                            alternative
                            alternativeSpoiler
                            userPreferred
                        }
                        image {
                            large
                            medium
                        }
                        description(asHtml: false)
                        gender
                        dateOfBirth {
                            year
                            month
                            day
                        }
                        age
                        bloodType
                        favourites
                        isFavourite
                        isFavouriteBlocked
                        siteUrl
                        modNotes
                    }
                }
            }
            staff(page: 1, perPage: 25, sort: [RELEVANCE, ID]) @include(if: $extended) {
                edges {
                    id
                    role
                    node {
                        id
                        name {
                            first
                            middle
                            last
                            full
                            native
                            alternative
                            userPreferred
                        }
                        languageV2
                        image {
                            large
                            medium
                        }
                        description(asHtml: false)
                        primaryOccupations
                        gender
                        dateOfBirth {
                            year
                            month
                            day
                        }
                        dateOfDeath {
                            year
                            month
                            day
                        }
                        age
                        yearsActive
                        homeTown
                        bloodType
                        favourites
                        isFavourite
                        isFavouriteBlocked
                        siteUrl
                        modNotes
                        submitter {
                            id
                            name
                        }
                        submissionStatus
                        submissionNotes
                    }
                }
            }
            studios @include(if: $extended) {
                edges {
                    id
                    isMain
                    node {
                        id
                        name
                        isAnimationStudio
                        favourites
                        isFavourite
                        siteUrl
                    }
                }
            }
            isFavourite
            isFavouriteBlocked
            isAdult
            nextAiringEpisode @include(if: $extended) {
                id
                airingAt
                timeUntilAiring
                episode
                mediaId
            }
            airingSchedule(page: 1, perPage: 25, notYetAired: true) @include(if: $extended) {
                edges {
                    node {
                        id
                        airingAt
                        timeUntilAiring
                        episode
                    }
                }
            }
            trends(page: 1, perPage: 25, sort: [DATE_DESC]) @include(if: $extended) {
                edges {
                    node {
                        date
                        trending
                        popularity
                        inProgress
                        releasing
                        episode
                        averageScore
                        mediaId
                    }
                }
            }
            externalLinks @include(if: $extended) {
                id
                url
                site
                siteId
                type
                language
                color
                icon
                notes
                isDisabled
            }
            streamingEpisodes @include(if: $extended) {
                title
                thumbnail
                url
                site
            }
            rankings @include(if: $extended) {
                id
                rank
                type
                format
                year
                season
                allTime
                context
            }
            mediaListEntry @include(if: $extended) {
                id
                status
                score(format: POINT_100)
                progress
                progressVolumes
                repeat
                priority
                private
                notes
                hiddenFromStatusLists
                customLists
                advancedScores
                startedAt {
                    year
                    month
                    day
                }
                completedAt {
                    year
                    month
                    day
                }
                updatedAt
                createdAt
                user {
                    id
                    name
                }
            }
            reviews(page: 1, perPage: 10, sort: [RATING_DESC]) @include(if: $extended) {
                edges {
                    node {
                        id
                        userId
                        mediaId
                        mediaType
                        summary
                        body(asHtml: false)
                        rating
                        ratingAmount
                        userRating
                        score
                        private
                        siteUrl
                        createdAt
                        updatedAt
                        user {
                            id
                            name
                            avatar {
                                large
                                medium
                            }
                            donatorTier
                            donatorBadge
                            moderatorRoles
                        }
                    }
                }
            }
            recommendations(page: 1, perPage: 10, sort: [RATING_DESC]) @include(if: $extended) {
                edges {
                    node {
                        id
                        rating
                        userRating
                        mediaRecommendation {
                            id
                            title {
                                romaji
                                english
                                native
                                userPreferred
                            }
                            format
                            type
                            status
                            description(asHtml: false)
                            averageScore
                            coverImage {
                                medium
                                large
                            }
                            siteUrl
                        }
                        user {
                            id
                            name
                            avatar {
                                large
                                medium
                            }
                        }
                    }
                }
            }
            stats @include(if: $extended) {
                statusDistribution {
                    status
                    amount
                }
                scoreDistribution {
                    score
                    amount
                }
            }
            siteUrl
            autoCreateForumThread @include(if: $extended)
            isRecommendationBlocked @include(if: $extended)
            isReviewBlocked @include(if: $extended)
            modNotes @include(if: $extended)
        }
    }
}
