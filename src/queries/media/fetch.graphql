query MediaSearch(
    # Basic filters
    $id: Int
    $idMal: Int
    $search: String
    $type: MediaType
    $format: MediaFormat
    $status: MediaStatus
    $season: MediaSeason
    $seasonYear: Int
    $genre: String
    $tag: String
    $tagCategory: String
    $minimumTagRank: Int
    $source: MediaSource
    $countryOfOrigin: CountryCode
    $isLicensed: Boolean
    $isAdult: Boolean
    $onList: Boolean
    $licensedBy: String
    $licensedById: Int

    # NOT filters
    $id_not: Int
    $id_in: [Int]
    $id_not_in: [Int]
    $idMal_not: Int
    $idMal_in: [Int]
    $idMal_not_in: [Int]
    $format_not: MediaFormat
    $format_in: [MediaFormat]
    $format_not_in: [MediaFormat]
    $status_not: MediaStatus
    $status_in: [MediaStatus]
    $status_not_in: [MediaStatus]
    $genre_in: [String]
    $genre_not_in: [String]
    $tag_in: [String]
    $tag_not_in: [String]
    $tagCategory_in: [String]
    $tagCategory_not_in: [String]
    $licensedBy_in: [String]
    $licensedById_in: [Int]
    $source_in: [MediaSource]

    # Date filters
    $startDate: FuzzyDateInt
    $endDate: FuzzyDateInt
    $startDate_greater: FuzzyDateInt
    $startDate_lesser: FuzzyDateInt
    $startDate_like: String
    $endDate_greater: FuzzyDateInt
    $endDate_lesser: FuzzyDateInt
    $endDate_like: String

    # Range filters
    $averageScore: Int
    $averageScore_not: Int
    $averageScore_greater: Int
    $averageScore_lesser: Int
    $popularity: Int
    $popularity_not: Int
    $popularity_greater: Int
    $popularity_lesser: Int
    $episodes: Int
    $episodes_greater: Int
    $episodes_lesser: Int
    $duration: Int
    $duration_greater: Int
    $duration_lesser: Int
    $chapters: Int
    $chapters_greater: Int
    $chapters_lesser: Int
    $volumes: Int
    $volumes_greater: Int
    $volumes_lesser: Int

    # Pagination & sorting
    $sort: [MediaSort]
    $page: Int = 1
    $perPage: Int = 20

    # Extra
    $description_as_html: Boolean = false
    $includeStartDate: Boolean = false
    $includeEndDate: Boolean = false
    $includeDuration: Boolean = false
    $includeVolumes: Boolean = false
    $includeCountryOfOrigin: Boolean = false
    $includeIsLicensed: Boolean = false
    $includeSource: Boolean = false
    $includeHashtag: Boolean = false
    $includeTrailer: Boolean = false
    $includeUpdatedAt: Boolean = false
    $includeCoverImageExtraLarge: Boolean = false
    $includeMeanScore: Boolean = false
    $includeIsLocked: Boolean = false
    $includeTrending: Boolean = false
    $includeTags: Boolean = false
    $includeNextAiringEpisode: Boolean = false
    $includeRelations: Boolean = false
    $includeCharacters: Boolean = false
    $includeStaff: Boolean = false
    $includeStudios: Boolean = false
    $includeMediaListEntryDetails: Boolean = false
    $includeReviews: Boolean = false
    $includeRecommendations: Boolean = false
    $includeExternalLinks: Boolean = false
    $includeStreamingEpisodes: Boolean = false
    $includeRankings: Boolean = false
    $includeStats: Boolean = false
    $includeAutoCreateForumThread: Boolean = false
    $includeIsRecommendationBlocked: Boolean = false
    $includeIsReviewBlocked: Boolean = false
    $includeModNotes: Boolean = false
    # Pagination
    $charactersPage: Int = 1
    $charactersPerPage: Int = 10
    $staffPage: Int = 1
    $staffPerPage: Int = 10
    $reviewsPage: Int = 1
    $reviewsPerPage: Int = 10
    $recommendationsPage: Int = 1
    $recommendationsPerPage: Int = 10
    # Included connection filters
    $voiceActorLanguage: StaffLanguage
) {
    Page(page: $page, perPage: $perPage) {
        pageInfo {
            total
            currentPage
            lastPage
            hasNextPage
            perPage
        }
        media(
            id: $id
            idMal: $idMal
            search: $search
            type: $type
            format: $format
            status: $status
            season: $season
            seasonYear: $seasonYear
            startDate: $startDate
            endDate: $endDate
            genre: $genre
            tag: $tag
            tagCategory: $tagCategory
            minimumTagRank: $minimumTagRank
            source: $source
            countryOfOrigin: $countryOfOrigin
            isLicensed: $isLicensed
            isAdult: $isAdult
            onList: $onList
            licensedBy: $licensedBy
            licensedById: $licensedById
            id_not: $id_not
            id_in: $id_in
            id_not_in: $id_not_in
            idMal_not: $idMal_not
            idMal_in: $idMal_in
            idMal_not_in: $idMal_not_in
            format_not: $format_not
            format_in: $format_in
            format_not_in: $format_not_in
            status_not: $status_not
            status_in: $status_in
            status_not_in: $status_not_in
            genre_in: $genre_in
            genre_not_in: $genre_not_in
            tag_in: $tag_in
            tag_not_in: $tag_not_in
            tagCategory_in: $tagCategory_in
            tagCategory_not_in: $tagCategory_not_in
            licensedBy_in: $licensedBy_in
            licensedById_in: $licensedById_in
            source_in: $source_in
            startDate_greater: $startDate_greater
            startDate_lesser: $startDate_lesser
            startDate_like: $startDate_like
            endDate_greater: $endDate_greater
            endDate_lesser: $endDate_lesser
            endDate_like: $endDate_like
            averageScore: $averageScore
            averageScore_not: $averageScore_not
            averageScore_greater: $averageScore_greater
            averageScore_lesser: $averageScore_lesser
            popularity: $popularity
            popularity_not: $popularity_not
            popularity_greater: $popularity_greater
            popularity_lesser: $popularity_lesser
            episodes: $episodes
            episodes_greater: $episodes_greater
            episodes_lesser: $episodes_lesser
            duration: $duration
            duration_greater: $duration_greater
            duration_lesser: $duration_lesser
            chapters: $chapters
            chapters_greater: $chapters_greater
            chapters_lesser: $chapters_lesser
            volumes: $volumes
            volumes_greater: $volumes_greater
            volumes_lesser: $volumes_lesser
            sort: $sort
        ) {
            id
            idMal
            title {
                romaji
                english
                native
                userPreferred
            }
            type
            format
            status
            description(asHtml: $description_as_html)
            startDate @include(if: $includeStartDate) {
                year
                month
                day
            }
            endDate @include(if: $includeEndDate) {
                year
                month
                day
            }
            season
            seasonYear
            episodes
            duration @include(if: $includeDuration)
            chapters
            volumes @include(if: $includeVolumes)
            countryOfOrigin @include(if: $includeCountryOfOrigin)
            isLicensed @include(if: $includeIsLicensed)
            source @include(if: $includeSource)
            hashtag @include(if: $includeHashtag)
            trailer @include(if: $includeTrailer) {
                id
                site
                thumbnail
            }
            updatedAt @include(if: $includeUpdatedAt)
            coverImage {
                extraLarge @include(if: $includeCoverImageExtraLarge)
                large
                medium
                color
            }
            bannerImage
            genres
            synonyms
            averageScore
            meanScore @include(if: $includeMeanScore)
            popularity
            isLocked @include(if: $includeIsLocked)
            trending @include(if: $includeTrending)
            favourites
            tags @include(if: $includeTags) {
                id
                name
                description
                category
                rank
                isGeneralSpoiler
                isMediaSpoiler
                isAdult
                userId
            }
            relations @include(if: $includeRelations) {
                edges {
                    id
                    relationType
                    node {
                        id
                        title {
                            romaji
                            english
                            native
                            userPreferred
                        }
                        type
                        format
                        status
                        coverImage {
                            large
                        }
                    }
                }
            }
            characters(page: $charactersPage, perPage: $charactersPerPage, sort: ROLE) @include(if: $includeCharacters) {
                pageInfo {
                    total
                    perPage
                    currentPage
                    lastPage
                    hasNextPage
                }
                edges {
                    id
                    role
                    name
                    voiceActorRoles(language: $voiceActorLanguage) {
                        voiceActor {
                            id
                            name {
                                first
                                middle
                                last
                                full
                                native
                                alternative
                                userPreferred
                            }
                            language
                            image {
                                large
                            }
                        }
                        roleNotes
                        dubGroup
                    }
                    node {
                        id
                        name {
                            first
                            middle
                            last
                            full
                            native
                            alternative
                            userPreferred
                        }
                        image {
                            large
                        }
                    }
                }
            }
            staff(page: $staffPage, perPage: $staffPerPage, sort: ROLE) @include(if: $includeStaff) {
                pageInfo {
                    total
                    perPage
                    currentPage
                    lastPage
                    hasNextPage
                }
                edges {
                    id
                    role
                    node {
                        id
                        name {
                            first
                            middle
                            last
                            full
                            native
                            alternative
                            userPreferred
                        }
                        image {
                            large
                        }
                        primaryOccupations
                    }
                }
            }
            studios(isMain: true) {
                edges {
                    node {
                        id
                        name
                        siteUrl
                    }
                }
            }
            fullStudios: studios @include(if: $includeStudios) {
                edges {
                    id
                    isMain
                    node {
                        id
                        name
                        isAnimationStudio
                        siteUrl
                        favourites
                    }
                }
            }
            isFavourite
            isFavouriteBlocked
            isAdult
            nextAiringEpisode @include(if: $includeNextAiringEpisode) {
                id
                airingAt
                timeUntilAiring
                episode
            }
            mediaListEntry {
                id
                status
                score
                progress
                progressVolumes @include(if: $includeMediaListEntryDetails)
                repeat @include(if: $includeMediaListEntryDetails)
                priority @include(if: $includeMediaListEntryDetails)
                notes @include(if: $includeMediaListEntryDetails)
                hiddenFromStatusLists @include(if: $includeMediaListEntryDetails)
                customLists @include(if: $includeMediaListEntryDetails)
                advancedScores @include(if: $includeMediaListEntryDetails)
                startedAt @include(if: $includeMediaListEntryDetails) {
                    year
                    month
                    day
                }
                completedAt @include(if: $includeMediaListEntryDetails) {
                    year
                    month
                    day
                }
                updatedAt @include(if: $includeMediaListEntryDetails)
                createdAt @include(if: $includeMediaListEntryDetails)
            }
            reviews(page: $reviewsPage, perPage: $reviewsPerPage, sort: RATING_DESC) @include(if: $includeReviews) {
                 pageInfo {
                    total
                    perPage
                    currentPage
                    lastPage
                    hasNextPage
                }
                nodes {
                    id
                    summary
                    rating
                    ratingAmount
                    userRating
                    score
                    user {
                        id
                        name
                        avatar {
                            large
                        }
                    }
                }
            }
            recommendations(page: $recommendationsPage, perPage: $recommendationsPerPage, sort: RATING_DESC) @include(if: $includeRecommendations) {
                 pageInfo {
                    total
                    perPage
                    currentPage
                    lastPage
                    hasNextPage
                }
                nodes {
                    id
                    rating
                    userRating
                    mediaRecommendation {
                        id
                        title {
                            romaji
                            english
                            native
                            userPreferred
                        }
                        type
                        format
                        status
                        coverImage {
                            large
                        }
                    }
                    user {
                        id
                        name
                        avatar {
                            large
                        }
                    }
                }
            }
            externalLinks @include(if: $includeExternalLinks) {
                id
                url
                site
                siteId
                type
                language
                color
                icon
                notes
                isDisabled
            }
            streamingEpisodes @include(if: $includeStreamingEpisodes) {
                title
                thumbnail
                url
                site
            }
            rankings @include(if: $includeRankings) {
                id
                rank
                type
                format
                year
                season
                allTime
                context
            }
            stats @include(if: $includeStats) {
                scoreDistribution {
                    score
                    amount
                }
                statusDistribution {
                    status
                    amount
                }
            }
            siteUrl
            autoCreateForumThread @include(if: $includeAutoCreateForumThread)
            isRecommendationBlocked @include(if: $includeIsRecommendationBlocked)
            isReviewBlocked @include(if: $includeIsReviewBlocked)
            modNotes @include(if: $includeModNotes)
        }
    }
}
