mutation SaveRecommendation(
    $mediaId: Int!
    $mediaRecommendationId: Int!
    $rating: RecommendationRating!
) {
    SaveRecommendation(
        mediaId: $mediaId
        mediaRecommendationId: $mediaRecommendationId
        rating: $rating
    ) {
        id
        rating
        userRating
        media {
            id
            title {
                romaji
                english
                native
                userPreferred
            }
            type
            format
            coverImage {
                medium
            }
        }
        mediaRecommendation {
            id
            title {
                romaji
                english
                native
                userPreferred
            }
            type
            format
            coverImage {
                medium
            }
        }
        user {
            id
            name
            avatar {
                large
                medium
            }
        }
    }
}
