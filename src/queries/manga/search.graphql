query ($page: Int, $perPage: Int, $search: String, $genre: String, $year: FuzzyDateInt, $format: MediaFormat, $status: MediaStatus) {
    Page (page: $page, perPage: $perPage) {
        pageInfo {
            total
            currentPage
            lastPage
            hasNextPage
            perPage
        }
        media (search: $search, genre: $genre, startDate_greater: $year, format: $format, status: $status, type: MANGA) {
            id
            title {
                romaji
                english
                native
                userPreferred
            }
            description
            format
            status
            startDate {
                year
                month
                day
            }
            endDate {
                year
                month
                day
            }
            chapters
            volumes
            genres
            averageScore
            meanScore
            popularity
            favourites
            hashtag
            countryOfOrigin
            isAdult
            coverImage {
                extraLarge
                large
                medium
                color
            }
            bannerImage
            siteUrl
        }
    }
}
