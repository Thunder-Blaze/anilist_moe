query (
  $page: Int
  $id: Int
  $perPage: Int
  $search: String
  $sort: [StaffSort]
  $isBirthday: Boolean
  # NOT filters
  $id_not: Int
  $id_in: [Int]
  $id_not_in: [Int]
  # Sub-pagination variables
  $staffMediaPage: Int = 1
  $staffMediaPerPage: Int = 5
  $charactersPage: Int = 1
  $charactersPerPage: Int = 5
  $characterMediaPage: Int = 1
  $characterMediaPerPage: Int = 5
) {
  Page(page: $page, perPage: $perPage) {
    pageInfo {
      total
      perPage
      currentPage
      lastPage
      hasNextPage
    }
    staff(id: $id, search: $search, sort: $sort, isBirthday: $isBirthday, id_not: $id_not, id_in: $id_in, id_not_in: $id_not_in) {
      id
      name {
        first
        middle
        last
        full
        native
        userPreferred
      }
      languageV2
      image {
        large
        medium
      }
      description
      primaryOccupations
      gender
      dateOfBirth {
        year
        month
        day
      }
      dateOfDeath {
        year
        month
        day
      }
      age
      yearsActive
      homeTown
      bloodType
      isFavourite
      isFavouriteBlocked
      siteUrl
      staffMedia(sort: [START_DATE_DESC], page: $staffMediaPage, perPage: $staffMediaPerPage) {
        edges {
          id
          staffRole
          node {
            id
            title {
              romaji
              english
              native
              userPreferred
            }
            type
            format
            bannerImage
          }
        }
      }
      characters(sort: [ROLE, RELEVANCE, ID], page: $charactersPage, perPage: $charactersPerPage) {
        edges {
          id
          role
          node {
            id
            name {
              full
            }
            image {
              large
            }
          }
        }
      }
      characterMedia(sort: [START_DATE_DESC], page: $characterMediaPage, perPage: $characterMediaPerPage) {
        edges {
          id
          node {
            id
            title {
              romaji
              english
            }
            type
            format
          }
        }
      }
      staff {
        id
        name {
          full
        }
      }
      submitter {
        id
        name
      }
      submissionStatus
      submissionNotes
      favourites
      modNotes
    }
  }
}

