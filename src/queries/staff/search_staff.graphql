query (
  $page: Int
  $id: Int
  $perPage: Int
  $search: String
  $sort: [StaffSort]
  $isBirthday: Boolean
) {
  Page(page: $page, perPage: $perPage) {
    pageInfo {
      total
      perPage
      currentPage
      lastPage
      hasNextPage
    }
    staff(id: $id, search: $search, sort: $sort, isBirthday: $isBirthday) {
      id
      name {
        first
        middle
        last
        full
        native
        userPreferred
      }
      languageV2
      image {
        large
        medium
      }
      description
      primaryOccupations
      gender
      dateOfBirth {
        year
        month
        day
      }
      dateOfDeath {
        year
        month
        day
      }
      age
      yearsActive
      homeTown
      bloodType
      isFavourite
      isFavouriteBlocked
      siteUrl
      staffMedia(sort: [START_DATE_DESC], perPage: 5) {
        edges {
          id
          staffRole
          node {
            id
            title {
              romaji
              english
              native
              userPreferred
            }
            type
            format
            bannerImage
          }
        }
      }
      characters(sort: [ROLE, RELEVANCE, ID], perPage: 5) {
        edges {
          id
          role
          node {
            id
            name {
              full
            }
            image {
              large
            }
          }
        }
      }
      characterMedia(sort: [START_DATE_DESC], perPage: 5) {
        edges {
          id
          node {
            id
            title {
              romaji
              english
            }
            type
            format
          }
        }
      }
      staff {
        id
        name {
          full
        }
      }
      submitter {
        id
        name
      }
      submissionStatus
      submissionNotes
      favourites
      modNotes
    }
  }
}

