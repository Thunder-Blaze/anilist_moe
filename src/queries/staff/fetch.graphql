query (
  $page: Int
  $id: Int
  $perPage: Int
  $search: String
  $sort: [StaffSort]
  $isBirthday: Boolean
  # NOT filters
  $id_not: Int
  $id_in: [Int]
  $id_not_in: [Int]
) {
  Page(page: $page, perPage: $perPage) {
    pageInfo {
      total
      perPage
      currentPage
      lastPage
      hasNextPage
    }
    staff(id: $id, search: $search, sort: $sort, isBirthday: $isBirthday, id_not: $id_not, id_in: $id_in, id_not_in: $id_not_in) {
      id
      name {
        full
        native
      }
      image {
        large
      }
      description
      primaryOccupations
      gender
      dateOfBirth {
        year
        month
        day
      }
      age
      isFavourite
      siteUrl
      favourites
    }
  }
}

