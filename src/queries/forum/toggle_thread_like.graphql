mutation ToggleThreadLike(
    $id: Int!
    $type: LikeableType!
) {
    ToggleLikeV2(
        id: $id
        type: $type
    ) {
        ... on Thread {
            id
            title
            body(asHtml: false)
            userId
            replyUserId
            replyCount
            viewCount
            replyCommentId
            repliedAt
            createdAt
            updatedAt
            locked
            sticky
            subscribed
            likeCount
            isLiked
            siteUrl
            categories {
                id
                name
            }
            mediaCategories {
                id
                title {
                    romaji
                    english
                    native
                    userPreferred
                }
                type
                format
                coverImage {
                    medium
                }
            }
            user {
                id
                name
                avatar {
                    large
                    medium
                }
            }
            replyUser {
                id
                name
                avatar {
                    large
                    medium
                }
            }
        }
        ... on ThreadComment {
            id
            userId
            threadId
            comment(asHtml: false)
            likeCount
            isLiked
            siteUrl
            createdAt
            updatedAt
            thread {
                id
                title
            }
            user {
                id
                name
                avatar {
                    large
                    medium
                }
            }
        }
    }
}
