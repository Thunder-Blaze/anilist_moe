query FetchThread(
    $id: Int!
    $body_as_html: Boolean = false
) {
    Thread(id: $id) {
        id
        title
        body(asHtml: $body_as_html)
        userId
        replyUserId
        replyCount
        viewCount
        replyCommentId
        repliedAt
        createdAt
        updatedAt
        isLocked
        isSticky
        isSubscribed
        likeCount
        isLiked
        siteUrl
        categories {
            id
            name
        }
        mediaCategories {
            id
            title {
                romaji
                english
                native
                userPreferred
            }
            type
            format
            status
            coverImage {
                large
                medium
                color
            }
            bannerImage
        }
        user {
            id
            name
            avatar {
                large
                medium
            }
            donatorTier
            donatorBadge
            moderatorRoles
        }
        replyUser {
            id
            name
            avatar {
                large
                medium
            }
            donatorTier
            donatorBadge
            moderatorRoles
        }
    }
}
