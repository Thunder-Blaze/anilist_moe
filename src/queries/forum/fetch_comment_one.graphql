query FetchThreadComment(
    $id: Int!
    $comment_as_html: Boolean = false
) {
    ThreadComment(id: $id) {
        id
        threadId
        userId
        comment(asHtml: $comment_as_html)
        likeCount
        isLiked
        siteUrl
        createdAt
        updatedAt
        isLocked
        thread {
            id
            title
            siteUrl
        }
        user {
            id
            name
            avatar {
                large
                medium
            }
            donatorTier
            donatorBadge
            moderatorRoles
        }
        likes {
            id
            name
            avatar {
                large
                medium
            }
        }
        childComments
        likes {
            id
            name
            avatar {
                medium
            }
        }
    }
}
