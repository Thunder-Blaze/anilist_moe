mutation SaveThread(
    $id: Int
    $title: String
    $body: String
    $categories: [Int]
    $mediaCategories: [Int]
    $locked: Boolean
    $sticky: Boolean

    # HTML rendering options
    $body_as_html: Boolean = false
) {
    SaveThread(
        id: $id
        title: $title
        body: $body
        categories: $categories
        mediaCategories: $mediaCategories
        locked: $locked
        sticky: $sticky
    ) {
        id
        title
        body(asHtml: $body_as_html)
        userId
        replyCount
        viewCount
        createdAt
        updatedAt
        isLocked
        isSticky
        isSubscribed
        likeCount
        isLiked
        siteUrl
        categories {
            id
            name
        }
        mediaCategories {
            id
            title {
                romaji
                english
                native
                userPreferred
            }
            type
            format
            coverImage {
                medium
            }
        }
        user {
            id
            name
            avatar {
                large
                medium
            }
        }
    }
}
