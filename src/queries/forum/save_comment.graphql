mutation SaveThreadComment(
    $id: Int
    $threadId: Int!
    $parentCommentId: Int
    $comment: String!
    $locked: Boolean

    # HTML rendering options
    $comment_as_html: Boolean = false
) {
    SaveThreadComment(
        id: $id
        threadId: $threadId
        parentCommentId: $parentCommentId
        comment: $comment
        locked: $locked
    ) {
        id
        userId
        threadId
        comment(asHtml: $comment_as_html)
        likeCount
        isLiked
        siteUrl
        createdAt
        updatedAt
        thread {
            id
            title
            replyCount
        }
        user {
            id
            name
            avatar {
                large
                medium
            }
            donatorTier
            donatorBadge
            moderatorRoles
        }
        likes {
            id
            name
            avatar {
                large
                medium
            }
        }
        childComments
    }
}
