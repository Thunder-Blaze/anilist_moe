query GetUserFavoritesAnime(
    $userId: Int!
    $page: Int = 1
    $perPage: Int = 25
    $sort: [MediaSort]
) {
    User(id: $userId) {
        favourites {
            anime(page: $page, perPage: $perPage, sort: $sort) {
                pageInfo {
                    total
                    currentPage
                    lastPage
                    hasNextPage
                    perPage
                }
                nodes {
                    id
                    title {
                        romaji
                        english
                        native
                        userPreferred
                    }
                    coverImage {
                        extraLarge
                        large
                        medium
                        color
                    }
                    type
                    format
                    status
                    episodes
                    duration
                    chapters
                    volumes
                    averageScore
                    popularity
                    trending
                    genres
                    tags {
                        id
                        name
                        description
                        rank
                    }
                    staff {
                        edges {
                            node {
                                id
                                name {
                                    userPreferred
                                }
                            }
                            role
                        }
                    }
                    studios {
                        edges {
                            node {
                                id
                                name
                            }
                            isMain
                        }
                    }
                    startDate {
                        year
                        month
                        day
                    }
                    endDate {
                        year
                        month
                        day
                    }
                    season
                    seasonYear
                    isAdult
                    countryOfOrigin
                    siteUrl
                    description
                }
            }
        }
    }
}
