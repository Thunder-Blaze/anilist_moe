query GetUserActivities(
    $userId: Int!
    $page: Int = 1
    $perPage: Int = 25
    $sort: [ActivitySort] = [ID_DESC]
    $type: ActivityType
    $hasReplies: Boolean
) {
    Page(page: $page, perPage: $perPage) {
        pageInfo {
            total
            currentPage
            lastPage
            hasNextPage
            perPage
        }
        activities(
            userId: $userId
            sort: $sort
            type: $type
            hasReplies: $hasReplies
        ) {
            ... on TextActivity {
                id
                userId
                type
                text(asHtml: false)
                siteUrl
                isLocked
                isSubscribed
                likeCount
                replyCount
                isLiked
                isPinned
                createdAt
                user {
                    id
                    name
                    avatar {
                        large
                        medium
                    }
                    donatorTier
                    donatorBadge
                    moderatorRoles
                }
                replies(page: 1, perPage: 3) {
                    id
                    userId
                    text(asHtml: false)
                    likeCount
                    isLiked
                    createdAt
                    user {
                        id
                        name
                        avatar {
                            large
                            medium
                        }
                    }
                }
                likes {
                    id
                    name
                    avatar {
                        large
                        medium
                    }
                }
            }
            ... on ListActivity {
                id
                userId
                type
                status
                progress
                isLocked
                isSubscribed
                likeCount
                replyCount
                isLiked
                isPinned
                siteUrl
                createdAt
                user {
                    id
                    name
                    avatar {
                        large
                        medium
                    }
                    donatorTier
                    donatorBadge
                    moderatorRoles
                }
                media {
                    id
                    title {
                        romaji
                        english
                        native
                        userPreferred
                    }
                    type
                    format
                    status
                    coverImage {
                        extraLarge
                        large
                        medium
                        color
                    }
                    siteUrl
                }
                replies(page: 1, perPage: 3) {
                    id
                    userId
                    text(asHtml: false)
                    likeCount
                    isLiked
                    createdAt
                    user {
                        id
                        name
                        avatar {
                            large
                            medium
                        }
                    }
                }
                likes {
                    id
                    name
                    avatar {
                        large
                        medium
                    }
                }
            }
            ... on MessageActivity {
                id
                recipientId
                messengerId
                type
                message(asHtml: false)
                isLocked
                isSubscribed
                likeCount
                replyCount
                isLiked
                isPrivate
                siteUrl
                createdAt
                messenger {
                    id
                    name
                    avatar {
                        large
                        medium
                    }
                    donatorTier
                    donatorBadge
                    moderatorRoles
                }
                recipient {
                    id
                    name
                    avatar {
                        large
                        medium
                    }
                    donatorTier
                    donatorBadge
                    moderatorRoles
                }
                replies(page: 1, perPage: 3) {
                    id
                    userId
                    text(asHtml: false)
                    likeCount
                    isLiked
                    createdAt
                    user {
                        id
                        name
                        avatar {
                            large
                            medium
                        }
                    }
                }
                likes {
                    id
                    name
                    avatar {
                        large
                        medium
                    }
                }
            }
        }
    }
}
