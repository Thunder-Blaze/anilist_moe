query GetUserFavoritesStudios(
    $userId: Int!
    $page: Int = 1
    $perPage: Int = 25
    $sort: [StudioSort]
) {
    User(id: $userId) {
        favourites {
            studios(page: $page, perPage: $perPage, sort: $sort) {
                pageInfo {
                    total
                    currentPage
                    lastPage
                    hasNextPage
                    perPage
                }
                nodes {
                    id
                    name
                    isAnimationStudio
                    favourites
                    isFavourite
                    siteUrl
                    media {
                        pageInfo {
                            total
                            currentPage
                            lastPage
                            hasNextPage
                            perPage
                        }
                        edges {
                            node {
                                id
                                title {
                                    romaji
                                    english
                                    native
                                    userPreferred
                                }
                                type
                                format
                                status
                                averageScore
                                popularity
                                coverImage {
                                    large
                                    medium
                                    color
                                }
                                startDate {
                                    year
                                    month
                                    day
                                }
                                endDate {
                                    year
                                    month
                                    day
                                }
                                season
                                seasonYear
                                siteUrl
                            }
                            isMain
                        }
                    }
                }
            }
        }
    }
}
