query SearchUsers(
    $id: Int
    $name: String
    $search: String
    $sort: [UserSort]
    $page: Int = 1
    $perPage: Int = 20
) {
    Page(page: $page, perPage: $perPage) {
        pageInfo {
            total
            currentPage
            lastPage
            hasNextPage
            perPage
        }
        users(
            id: $id
            name: $name
            search: $search
            sort: $sort
        ) {
            id
            name
            about(asHtml: false)
            avatar {
                large
                medium
            }
            bannerImage
            isFollowing
            isFollower
            isBlocked
            bans
            options {
                titleLanguage
                displayAdultContent
                airingNotifications
                profileColor
                notificationOptions {
                    type
                    enabled
                }
                timezone
                activityMergeTime
                staffNameLanguage
            }
            mediaListOptions {
                scoreFormat
                rowOrder
                animeList {
                    sectionOrder
                    splitCompletedSectionByFormat
                    customLists
                    advancedScoring
                    advancedScoringEnabled
                }
                mangaList {
                    sectionOrder
                    splitCompletedSectionByFormat
                    customLists
                    advancedScoring
                    advancedScoringEnabled
                }
            }
            favourites {
                anime {
                    edges {
                        node {
                            id
                            title {
                                romaji
                                english
                                native
                                userPreferred
                            }
                            type
                            format
                            coverImage {
                                medium
                            }
                        }
                    }
                }
                manga {
                    edges {
                        node {
                            id
                            title {
                                romaji
                                english
                                native
                                userPreferred
                            }
                            type
                            format
                            coverImage {
                                medium
                            }
                        }
                    }
                }
                characters {
                    edges {
                        node {
                            id
                            name {
                                first
                                middle
                                last
                                full
                                native
                            }
                            image {
                                medium
                            }
                        }
                    }
                }
                staff {
                    edges {
                        node {
                            id
                            name {
                                first
                                middle
                                last
                                full
                                native
                            }
                            image {
                                medium
                            }
                        }
                    }
                }
                studios {
                    edges {
                        node {
                            id
                            name
                        }
                    }
                }
            }
            statistics {
                anime {
                    count
                    meanScore
                    standardDeviation
                    minutesWatched
                    episodesWatched
                    chaptersRead
                    volumesRead
                    formats {
                        format
                        count
                    }
                    statuses {
                        status
                        count
                    }
                    scores {
                        score
                        count
                    }
                    lengths {
                        length
                        count
                    }
                    releaseYears {
                        releaseYear
                        count
                    }
                    startYears {
                        startYear
                        count
                    }
                    genres {
                        genre
                        count
                    }
                    tags {
                        tag {
                            id
                            name
                        }
                        count
                    }
                    countries {
                        country
                        count
                    }
                    voiceActors {
                        voiceActor {
                            id
                            name {
                                first
                                middle
                                last
                                full
                                native
                            }
                        }
                        count
                    }
                    staff {
                        staff {
                            id
                            name {
                                first
                                middle
                                last
                                full
                                native
                            }
                        }
                        count
                    }
                    studios {
                        studio {
                            id
                            name
                        }
                        count
                    }
                }
                manga {
                    count
                    meanScore
                    standardDeviation
                    minutesWatched
                    episodesWatched
                    chaptersRead
                    volumesRead
                    formats {
                        format
                        count
                    }
                    statuses {
                        status
                        count
                    }
                    scores {
                        score
                        count
                    }
                    lengths {
                        length
                        count
                    }
                    releaseYears {
                        releaseYear
                        count
                    }
                    startYears {
                        startYear
                        count
                    }
                    genres {
                        genre
                        count
                    }
                    tags {
                        tag {
                            id
                            name
                        }
                        count
                    }
                    countries {
                        country
                        count
                    }
                    staff {
                        staff {
                            id
                            name {
                                first
                                middle
                                last
                                full
                                native
                            }
                        }
                        count
                    }
                }
            }
            unreadNotificationCount
            siteUrl
            donatorTier
            donatorBadge
            moderatorRoles
            createdAt
            updatedAt
        }
    }
}
