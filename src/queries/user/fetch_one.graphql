query GetUserById($id: Int!, $about_as_html: Boolean = false) {
    User(id: $id) {
        id
        name
        about(asHtml: $about_as_html)
        avatar {
            large
            medium
        }
        bannerImage
        siteUrl
        createdAt
        updatedAt
        isFollowing
        isFollower
        isBlocked
        bans
        options {
            titleLanguage
            displayAdultContent
            airingNotifications
            profileColor
        }
        mediaListOptions {
            scoreFormat
            rowOrder
            animeList {
                sectionOrder
                splitCompletedSectionByFormat
                customLists
                advancedScoring
                advancedScoringEnabled
            }
            mangaList {
                sectionOrder
                splitCompletedSectionByFormat
                customLists
                advancedScoring
                advancedScoringEnabled
            }
        }
        unreadNotificationCount
        donatorTier
        donatorBadge
        moderatorRoles
    }
}
