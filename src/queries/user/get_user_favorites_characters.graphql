query GetUserFavoritesCharacters(
    $userId: Int!
    $page: Int = 1
    $perPage: Int = 25
    $sort: [CharacterSort]
) {
    User(id: $userId) {
        favourites {
            characters(page: $page, perPage: $perPage, sort: $sort) {
                pageInfo {
                    total
                    currentPage
                    lastPage
                    hasNextPage
                    perPage
                }
                nodes {
                    id
                    name {
                        first
                        middle
                        last
                        full
                        native
                        userPreferred
                    }
                    image {
                        large
                        medium
                    }
                    description
                    gender
                    dateOfBirth {
                        year
                        month
                        day
                    }
                    age
                    bloodType
                    favourites
                    isFavourite
                    isFavouriteBlocked
                    siteUrl
                    media {
                        pageInfo {
                            total
                            currentPage
                            lastPage
                            hasNextPage
                            perPage
                        }
                        edges {
                            node {
                                id
                                title {
                                    romaji
                                    english
                                    native
                                    userPreferred
                                }
                                type
                                format
                                status
                                averageScore
                                popularity
                                coverImage {
                                    large
                                    medium
                                    color
                                }
                                siteUrl
                            }
                            characterRole
                            voiceActors {
                                id
                                name {
                                    userPreferred
                                }
                                languageV2
                                image {
                                    large
                                    medium
                                }
                            }
                        }
                    }
                }
            }
        }
    }
}
