mutation SaveReview(
    $id: Int
    $mediaId: Int!
    $body: String!
    $summary: String
    $score: Int
    $private: Boolean

    # HTML rendering options
    $body_as_html: Boolean = false
) {
    SaveReview(
        id: $id
        mediaId: $mediaId
        body: $body
        summary: $summary
        score: $score
        private: $private
    ) {
        id
        userId
        mediaId
        mediaType
        summary
        body(asHtml: $body_as_html)
        rating
        ratingAmount
        score
        private
        siteUrl
        createdAt
        updatedAt
        user {
            id
            name
            avatar {
                large
                medium
            }
        }
        media {
            id
            title {
                romaji
                english
                native
                userPreferred
            }
            type
            format
            coverImage {
                medium
            }
        }
    }
}
