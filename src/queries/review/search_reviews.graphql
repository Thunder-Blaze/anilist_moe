query SearchReviews(
    $id: Int
    $mediaId: Int
    $userId: Int
    $mediaType: MediaType
    $score: Int
    $score_greater: Int
    $score_lesser: Int
    # NOT filters
    $id_not: Int
    $id_in: [Int]
    $id_not_in: [Int]
    $mediaId_not: Int
    $mediaId_in: [Int]
    $mediaId_not_in: [Int]
    $userId_not: Int
    $userId_in: [Int]
    $userId_not_in: [Int]
    $score_not: Int
    $score_in: [Int]
    $score_not_in: [Int]
    $sort: [ReviewSort]
    $page: Int = 1
    $perPage: Int = 20
) {
    Page(page: $page, perPage: $perPage) {
        pageInfo {
            total
            currentPage
            lastPage
            hasNextPage
            perPage
        }
        reviews(
            id: $id
            mediaId: $mediaId
            userId: $userId
            mediaType: $mediaType
            score: $score
            score_greater: $score_greater
            score_lesser: $score_lesser
            id_not: $id_not
            id_in: $id_in
            id_not_in: $id_not_in
            mediaId_not: $mediaId_not
            mediaId_in: $mediaId_in
            mediaId_not_in: $mediaId_not_in
            userId_not: $userId_not
            userId_in: $userId_in
            userId_not_in: $userId_not_in
            score_not: $score_not
            score_in: $score_in
            score_not_in: $score_not_in
            sort: $sort
        ) {
            id
            userId
            mediaId
            mediaType
            summary
            body(asHtml: false)
            rating
            ratingAmount
            score
            private
            siteUrl
            createdAt
            updatedAt
            user {
                id
                name
                avatar {
                    large
                    medium
                }
                donatorTier
                donatorBadge
                moderatorRoles
            }
            media {
                id
                title {
                    romaji
                    english
                    native
                    userPreferred
                }
                type
                format
                status
                description(asHtml: false)
                episodes
                chapters
                volumes
                averageScore
                coverImage {
                    large
                    medium
                }
                bannerImage
                siteUrl
            }
        }
    }
}
