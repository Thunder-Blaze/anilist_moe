mutation SaveTextActivity($id: Int, $text: String!, $locked: Boolean) {
    SaveTextActivity(id: $id, text: $text, locked: $locked) {
        __typename
        id
        type
        text
        isLocked
        replyCount
        siteUrl
        isLiked
        likeCount
        isSubscribed
        createdAt
        userId
        user {
            id
            name
            avatar {
                large
                medium
            }
        }
    }
}
