mutation ToggleActivityLike(
    $id: Int
    $type: LikeableType
) {
    ToggleLikeV2(
        id: $id
        type: $type
    ) {
        ... on ListActivity {
            id
            userId
            type
            status
            progress
            isLocked
            isSubscribed
            likeCount
            isLiked
            isPinned
            siteUrl
            createdAt
            user {
                id
                name
                avatar {
                    large
                    medium
                }
            }
            media {
                id
                title {
                    romaji
                    english
                    native
                    userPreferred
                }
                type
                format
                coverImage {
                    medium
                }
            }
        }
        ... on TextActivity {
            id
            userId
            type
            text(asHtml: false)
            isLocked
            isSubscribed
            likeCount
            isLiked
            isPinned
            siteUrl
            createdAt
            user {
                id
                name
                avatar {
                    large
                    medium
                }
            }
        }
        ... on MessageActivity {
            id
            recipientId
            messengerId
            type
            message(asHtml: false)
            isLocked
            isSubscribed
            likeCount
            isLiked
            isPrivate
            siteUrl
            createdAt
            recipient {
                id
                name
                avatar {
                    large
                    medium
                }
            }
            messenger {
                id
                name
                avatar {
                    large
                    medium
                }
            }
        }
    }
}
