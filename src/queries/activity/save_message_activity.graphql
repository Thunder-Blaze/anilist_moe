mutation SaveMessageActivity(
    $id: Int
    $message: String!
    $recipientId: Int!
    $private: Boolean
    $locked: Boolean
    $asMod: Boolean
) {
    SaveMessageActivity(
        id: $id
        message: $message
        recipientId: $recipientId
        private: $private
        locked: $locked
        asMod: $asMod
    ) {
        id
        message
        recipientId
        private
        locked
        asMod
        createdAt
        user {
            id
            name
        }
    }
}
