fragment UserFields on User {
    id
    name
    avatar {
        large
    }
}

fragment MediaFields on Media {
    id
    title {
        userPreferred
    }
    coverImage {
        large
    }
}

query FetchActivity(
    $id: Int
    $text_as_html: Boolean = false
    $message_as_html: Boolean = false
) {
    Activity(id: $id) {
        __typename
        ... on ListActivity {
            id
            type
            status
            progress
            createdAt
            replyCount
            likeCount
            isLiked
            isSubscribed
            user {
                ...UserFields
                donatorTier
                donatorBadge
                moderatorRoles
            }
            media {
                ...MediaFields
            }
            likes {
                ...UserFields
            }
        }
        ... on TextActivity {
            id
            type
            text(asHtml: $text_as_html)
            createdAt
            replyCount
            likeCount
            isLiked
            isSubscribed
            user {
                ...UserFields
                donatorTier
                donatorBadge
                moderatorRoles
            }
            likes {
                ...UserFields
            }
        }
        ... on MessageActivity {
            id
            type
            message(asHtml: $message_as_html)
            createdAt
            replyCount
            likeCount
            isLiked
            isSubscribed
            messenger {
                ...UserFields
                donatorTier
                donatorBadge
                moderatorRoles
            }
            recipient {
                ...UserFields
                donatorTier
                donatorBadge
                moderatorRoles
            }
            likes {
                ...UserFields
            }
        }
    }
}
