mutation SaveActivityReply(
    $id: Int
    $activityId: Int!
    $text: String!
) {
    SaveActivityReply(
        id: $id
        activityId: $activityId
        text: $text
    ) {
        id
        userId
        activityId
        text(asHtml: false)
        likeCount
        isLiked
        createdAt
        user {
            id
            name
            avatar {
                large
                medium
            }
        }
        likes {
            id
            name
            avatar {
                large
                medium
            }
        }
    }
}
