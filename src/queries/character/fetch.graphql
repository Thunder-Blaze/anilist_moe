query FetchCharacters(
  $page: Int
  $id: Int
  $perPage: Int
  $search: String
  $sort: [CharacterSort]
  $isBirthday: Boolean
  # NOT filters
  $id_not: Int
  $id_in: [Int]
  $id_not_in: [Int]
  # Extra
  $includeMedia: Boolean = false
  $includeModNotes: Boolean = false
  # Sub-pagination variables
  $mediaSort: [MediaSort] = [POPULARITY_DESC]
  $mediaPage: Int = 1
  $mediaPerPage: Int = 10
) {
  Page(page: $page, perPage: $perPage) {
    pageInfo {
      total
      perPage
      currentPage
      lastPage
      hasNextPage
    }
    characters(id: $id, search: $search, sort: $sort, isBirthday: $isBirthday, id_not: $id_not, id_in: $id_in, id_not_in: $id_not_in) {
      id
      name {
        full
        native
      }
      image {
        large
      }
      description
      gender
      dateOfBirth {
        year
        month
        day
      }
      age
      bloodType
      isFavourite
      siteUrl
      favourites
      modNotes @include(if: $includeModNotes)
      media(sort: $mediaSort, page: $mediaPage, perPage: $mediaPerPage) @include(if: $includeMedia) {
        pageInfo {
            total
            perPage
            currentPage
            lastPage
            hasNextPage
        }
        edges {
            id
            characterRole
            characterName
            voiceActorRoles {
                roleNotes
                dubGroup
                voiceActor {
                    id
                    name {
                        first
                        middle
                        last
                        full
                        native
                        userPreferred
                    }
                    languageV2
                    image {
                        large
                        medium
                    }
                    isFavourite
                }
            }
            node {
                id
                title {
                    romaji
                    english
                    native
                    userPreferred
                }
                type
                format
                status
                startDate {
                    year
                    month
                    day
                }
                endDate {
                    year
                    month
                    day
                }
                season
                seasonYear
                episodes
                chapters
                volumes
                averageScore
                popularity
                coverImage {
                    large
                    medium
                    color
                }
                bannerImage
                genres
                isAdult
            }
        }
      }
    }
  }
}
