query FetchCharacter(
    $id: Int
    $isBirthday: Boolean
    $search: String
    $id_not: Int
    $id_in: [Int]
    $id_not_in: [Int]
    $sort: [CharacterSort]
    # Sub-pagination variables
    $mediaSort: [MediaSort] = [POPULARITY_DESC]
    $mediaPage: Int = 1
    $mediaPerPage: Int = 10
) {
    Character(
        id: $id
        isBirthday: $isBirthday
        search: $search
        id_not: $id_not
        id_in: $id_in
        id_not_in: $id_not_in
        sort: $sort
    ) {
        id
        name {
            first
            middle
            last
            full
            native
            alternative
            userPreferred
        }
        image {
            large
            medium
        }
        description
        gender
        dateOfBirth {
            year
            month
            day
        }
        age
        bloodType
        isFavourite
        isFavouriteBlocked
        siteUrl
        media(sort: $mediaSort, page: $mediaPage, perPage: $mediaPerPage) {
            pageInfo {
                total
                perPage
                currentPage
                lastPage
                hasNextPage
            }
            edges {
                id
                characterRole
                characterName
                voiceActorRoles {
                    roleNotes
                    dubGroup
                    voiceActor {
                        id
                        name {
                            first
                            middle
                            last
                            full
                            native
                            userPreferred
                        }
                        languageV2
                        image {
                            large
                            medium
                        }
                        isFavourite
                    }
                }
                node {
                    id
                    title {
                        romaji
                        english
                        native
                        userPreferred
                    }
                    type
                    format
                    status
                    startDate {
                        year
                        month
                        day
                    }
                    endDate {
                        year
                        month
                        day
                    }
                    season
                    seasonYear
                    episodes
                    chapters
                    volumes
                    averageScore
                    popularity
                    coverImage {
                        large
                        medium
                        color
                    }
                    bannerImage
                    genres
                    isAdult
                }
            }
        }
        favourites
        modNotes
    }
}
