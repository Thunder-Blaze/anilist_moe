mutation ToggleLike(
    $id: Int
    $type: LikeableType
) {
    ToggleLikeV2(
        id: $id
        type: $type
    ) {
        ... on ListActivity {
            __typename
            id
            type
            replyCount
            likeCount
            isLiked
            createdAt
        }
        ... on TextActivity {
            __typename
            id
            type
            replyCount
            likeCount
            isLiked
            createdAt
        }
        ... on MessageActivity {
            __typename
            id
            type
            replyCount
            likeCount
            isLiked
            createdAt
        }
        ... on ActivityReply {
            __typename
            id
            likeCount
            createdAt
        }
        ... on Thread {
            __typename
            id
            userId
            likeCount
            isLiked
            createdAt
            updatedAt
        }
        ... on ThreadComment {
            __typename
            id
            likeCount
            isLiked
            createdAt
            updatedAt
        }
    }
}
