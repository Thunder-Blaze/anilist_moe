mutation ToggleLike(
    $id: Int
    $type: LikeableType
) {
    ToggleLikeV2(
        id: $id
        type: $type
    ) {
        ... on ListActivity {
            id
            isLiked
        }
        ... on TextActivity {
            id
            isLiked
        }
        ... on MessageActivity {
            id
            isLiked
        }
        ... on ActivityReply {
            id
            isLiked
        }
        ... on Thread {
            id
            isLiked
        }
        ... on ThreadComment {
            id
            isLiked
        }
    }
}
